name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Build
        run: gradle build --no-daemon 2>&1

      - name: Find JARs
        run: find . -name "*.jar" | head -20

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: hardend-diamond-set
          path: build/libs/*.jar
          if-no-files-found: warn
