name: Build Mod JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Build
        run: gradle build --info --no-daemon 2>&1

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: hardend-diamond-set
          path: build/libs/*.jar
          if-no-files-found: error
